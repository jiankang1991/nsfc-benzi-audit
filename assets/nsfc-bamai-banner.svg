<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NSFC 本子把脉</title>
  <desc id="desc">A banner for an NSFC application draft audit skill, with document, pulse, and diagnosis motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.48" stop-color="#eef7f4"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="teal" x1="116" y1="50" x2="281" y2="243" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f766e"/>
      <stop offset="1" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="red" x1="656" y1="189" x2="1098" y2="189" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f766e"/>
      <stop offset="0.5" stop-color="#e11d48"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#94a3b8" opacity="0.28"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="320" rx="28" fill="white" opacity="0.72"/>
  <rect x="20" y="20" width="1160" height="320" rx="28" stroke="#dbeafe"/>
  <rect x="44" y="44" width="1112" height="272" rx="22" fill="url(#dots)" opacity="0.45"/>

  <g filter="url(#shadow)">
    <circle cx="172" cy="178" r="88" fill="url(#teal)"/>
    <circle cx="172" cy="178" r="74" stroke="#ccfbf1" stroke-width="2" opacity="0.86"/>
    <circle cx="172" cy="178" r="58" stroke="#99f6e4" stroke-width="1.5" opacity="0.58"/>
    <text x="172" y="162" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="800" fill="#ffffff" letter-spacing="1">NSFC</text>
    <text x="172" y="198" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="700" fill="#dcfffb">本子把脉</text>
    <path d="M112 222 C137 206 151 225 172 216 C196 206 202 190 232 198" stroke="#fde68a" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g>
    <rect x="310" y="76" width="91" height="30" rx="15" fill="#ecfeff" stroke="#99f6e4"/>
    <circle cx="329" cy="91" r="5" fill="#0f766e"/>
    <text x="346" y="97" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#115e59">Agent Skill</text>

    <text x="310" y="163" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, sans-serif" font-size="58" font-weight="800" fill="#0f172a">NSFC 本子把脉</text>
    <text x="312" y="207" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, sans-serif" font-size="25" font-weight="600" fill="#334155">给国自然申请书做一次结构化体检</text>
    <text x="312" y="245" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, sans-serif" font-size="20" fill="#475569">逻辑诊断 · 修改建议 · 一致性矩阵 · 优先修改清单</text>

    <g transform="translate(310 274)">
      <rect width="118" height="28" rx="14" fill="#fef3c7"/>
      <text x="59" y="19" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#92400e">不是代写</text>
      <rect x="132" width="132" height="28" rx="14" fill="#dbeafe"/>
      <text x="198" y="19" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#1e40af">申请人自查</text>
      <rect x="278" width="142" height="28" rx="14" fill="#dcfce7"/>
      <text x="349" y="19" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#166534">面向修改</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="792" y="70" width="230" height="256" rx="18" fill="#ffffff" stroke="#dbeafe"/>
    <rect x="818" y="101" width="128" height="14" rx="7" fill="#0f766e" opacity="0.88"/>
    <rect x="818" y="132" width="178" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="818" y="154" width="150" height="10" rx="5" fill="#dbeafe"/>
    <rect x="818" y="176" width="188" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="818" y="226" width="156" height="10" rx="5" fill="#dbeafe"/>
    <rect x="818" y="248" width="184" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="818" y="270" width="132" height="10" rx="5" fill="#dbeafe"/>
    <path d="M824 205 H865 L881 178 L906 236 L927 202 H1008" stroke="url(#red)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="1030" cy="246" r="49" fill="#fff7ed" stroke="#fed7aa" stroke-width="7"/>
    <circle cx="1030" cy="246" r="27" fill="#ffffff" stroke="#f97316" stroke-width="5"/>
    <path d="M1066 282 L1110 326" stroke="#f97316" stroke-width="12" stroke-linecap="round"/>
    <path d="M1012 247 L1026 261 L1050 229" stroke="#0f766e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M656 188 C701 156 736 220 778 188" stroke="#0f766e" stroke-width="4" stroke-linecap="round" opacity="0.38"/>
  <path d="M88 91 C123 63 164 50 210 56" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" opacity="0.34"/>
  <path d="M1010 73 C1060 86 1092 115 1105 158" stroke="#0f766e" stroke-width="5" stroke-linecap="round" opacity="0.22"/>
</svg>
